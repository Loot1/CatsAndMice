# Configuration de base pour DecentHolograms
# Assurez-vous que les interactions sont activées

# Paramètres généraux
disabled-plugins: []
update-check: true
language: en

# Paramètres d'affichage
display: 
  # Distance maximale à laquelle les hologrammes sont visibles (en blocs)
  view-distance: 30
  # Mettre à jour la visibilité des joueurs (peut améliorer les performances)
  update-visibility: true
  # Mettre à jour les lignes des hologrammes (peut améliorer les performances)
  update-lines: true

# Paramètres d'interaction
interaction:
  # Activer/désactiver les interactions avec les hologrammes
  enabled: true
  # Distance d'interaction maximale (en blocs)
  click-range: 5.0
  # Activer le clic droit sur les hologrammes
  right-click: true
  # Activer le clic gauche sur les hologrammes
  left-click: true
  # Activer le clic avec shift sur les hologrammes
  shift-click: true

# Paramètres de performance
performance:
  # Désactiver les animations pour améliorer les performances
  disable-animations: false
  # Désactiver les effets de particules pour améliorer les performances
  disable-particles: false
  # Désactiver les sons pour améliorer les performances
  disable-sounds: false

# Paramètres de débogage
debug:
  # Activer les messages de débogage (utile pour le développement)
  enabled: false
  # Niveau de détail des logs (0-3)
  level: 1
