# Messages du plugin
messages:
  errors:
    permission-denied: '&cVous n''avez pas la permission.'
    console-sender: '&cCette commande n''est pas utilisable depuis la console.'
    click-cooldown: '&cVous devez attendre encore %time% secondes avant de pouvoir cliquer à nouveau !'
    already-reset: '&cLe score a déjà été réinitialisé !'
  help:
    - '§6=== §eAide de CatsAndMice §6==='
    - '§6/mice create §f- Crée un nouvel hologramme de jeu'
    - '§6/mice reload §f- Recharge la configuration'
  success:
    hologram-created: '&7Hologramme créé.'
    configuration-reload: '&7Configuration rechargée.'
    clicked: '&7Vous avez augmenté le score à &b%score%&7 !'
    score-reset: '&7Vous avez réinitialisé le score, il était à &b%score%&7 !'
    new-best-score: '&7Nouveau meilleur score au &c&l1&7&l-&e&l2&7&l-&a&l3&7&l-Modo&r&7 par &6%player%&7 : &b%score%&7 !'
  hologram:
    title: '&c&l1&7&l-&e&l2&7&l-&a&l3&7&l-Modo'
    top-description:
      - ''
      - '&7Défies les modos en faisant augmenter le score'
      - '&7Mais attention, car s''ils passent par là tout est fini !'
      - ''
      - '&7Meilleur score par &6%player%&7 avec &b%score%&7 le &d%day%&7 à &d%time% &7!'
      - ''
    click: '&d%time% &8| &6%player% &7monte à &b%score%&b!'
    reset: '&d%time% &8| &b%prefix%%player%&7 a réinitialisé !'
    click-button: '&a[+1]'
    sub-description: []

# Paramètres du jeu
settings:
  hologram-name: 'catsandmice_hologram'  # Nom de l'hologramme (doit correspondre au code)
  last-clicks: 10   # Nombre de lignes de clics à afficher (vrais ou faux joueurs)
  click-delay: 300   # Délai entre chaque clic en secondes (5 minutes par défaut)
  time-format: 'HH:mm'  # Format de l'heure pour les messages (ex: HH:mm, HH:mm:ss)
  enable-mock-names: true   # Faux joueurs
  notify-new-best-score: true   # Notifier les joueurs lorsqu'un nouveau meilleur score est atteint
  recent-on-bottom: true   # Afficher le clic le plus récent en bas (true) ou en haut (false)

# Configuration du webhook Discord
webhook:
  enabled: true # Activer/désactiver les notifications
  console-message: true # Afficher les alertes dans la console
  url: https://discord.com/api/webhooks/1400149876523794493/5LNTKKyZy2TrVdsluvyo5RPCAE84qoBixUySg9zn9L_rDlY4E6THqMdzrpI6lRWuDNGW
  threshold: 10 # Seuil pour déclencher l'alerte
  mention: '' # Mention à ajouter (@everyone, @here, <@&ROLE_ID>)

  # Messages
  alert-message: |-
    **🎮 CATS AND MICE - 1-2-3-Modo**
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━
    ⏰***Alerte score élevé***
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━
    🏆 **Joueur:** %player%
    ⚡ **Score atteint:** %score%
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━
  console-alert: '&6[CatsAndMice] &aAlerte de score: %player% a atteint %score% points'
