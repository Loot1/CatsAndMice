messages:
  errors:
    permission-denied: '<red>You do not have permission to do this.'
    console-sender: '<red>This command cannot be used from the console.'
    # %time% : remaining seconds before next click
    click-cooldown: '<red>You must wait <bold>%time%</bold> more seconds before clicking again!'
    already-reset: '<red>The score has already been reset!'
  help:
    - '<gold>=== <yellow>CatsAndMice Help <gold>==='
    - '<gold>/mice create <white>- Creates a new game hologram'
    - '<gold>/mice reload <white>- Reloads the configuration'
  success:
    hologram-created: '<gray>Hologram created.'
    configuration-reload: '<gray>Configuration reloaded.'
    # %score% : new score value
    clicked: '<gray>You increased the score to <aqua>%score%<gray>!'
    # %score% : score value before reset
    score-reset: '<gray>You reset the score, it was at <aqua>%score%<gray>!'
    # %player% : player name | %score% : best score value
    new-best-score: '<gray>New best score at <bold><red>1<gray>-<yellow>2<gray>-<green>3<gray>-Modo</bold> by <gold>%player%<gray>: <aqua>%score%<gray>!'
  hologram:
    title: '<bold><red>1<gray>-<yellow>2<gray>-<green>3<gray>-Modo</bold>'
    # %player% : best score player name | %score% : best score value
    # %prefix% : LuckPerms prefix | %time% : best score time | %day% : best score date (dd/MM/yyyy)
    top-description:
      - ''
      - '<gray>Challenge the mods by increasing the score'
      - '<gray>But be careful, if they come by, it''s all over!'
      - ''
      - '<gray>Best score by <gold>%player%<gray> with <aqua>%score%<gray> on <light_purple>%day%<gray> at <light_purple>%time%<gray>!'
      - ''
    # %time% : click time | %player% : player name | %prefix% : LuckPerms prefix | %score% : score at click
    click: '<light_purple>%time% <dark_gray>| <gold>%player% <gray>reaches <aqua>%score%<gray>!'
    # %time% : reset time | %player% : player name | %prefix% : LuckPerms prefix
    reset: '<light_purple>%time% <dark_gray>| <aqua>%prefix%%player%<gray> has reset!'
    click-button: '<green>[+1]'
    # %player% : best score player name | %score% : best score value
    # %prefix% : LuckPerms prefix | %time% : best score time | %day% : best score date (dd/MM/yyyy)
    sub-description: []

# Game settings
settings:
  hologram-name: 'catsandmice_hologram'  # Hologram name (must match the code)
  last-clicks: 10   # Number of click lines to display (real or fake players)
  click-delay: 300   # Delay between each click in seconds (5 minutes by default)
  time-format: 'HH:mm'  # Time format for messages (e.g. HH:mm, HH:mm:ss)
  enable-mock-names: true   # Enable fake players
  notify-new-best-score: true   # Notify players when a new best score is reached
  recent-on-bottom: true   # Display the most recent click at the bottom (true) or top (false)

# Discord webhook configuration
webhook:
  enabled: true # Enable/disable notifications
  console-message: true # Display alerts in the console
  url: 'https://discord.com/api/webhooks/your_webhook_here'
  threshold: 10 # Score threshold to trigger the alert
  mention: '' # Mention to add (@everyone, @here, <@&ROLE_ID>)

  # Messages
  # %player% : player name | %score% : score that triggered the alert
  alert-message: |-
    **🎮 CATS AND MICE - 1-2-3-Modo**
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━
    ⏰***High score alert***
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━
    🏆 **Player:** %player%
    ⚡ **Score reached:** %score%
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # %player% : player name | %score% : score that triggered the alert
  console-alert: '<gold>[CatsAndMice] <green>Score alert: %player% has reached %score% points'
